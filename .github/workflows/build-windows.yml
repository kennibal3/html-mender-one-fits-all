name: Build Windows desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build installer and portable app
        run: npm run dist:win

      - name: Upload Windows executables
        uses: actions/upload-artifact@v4
        with:
          name: HTML-Mender-Windows
          path: |
            release/HTML-Mender-Setup-*.exe
            release/HTML-Mender-Portable-*.exe
          if-no-files-found: error
